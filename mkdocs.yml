site_name: PyESPN

nav:
  - Home: index.md
  - Install: installing.md
  - PyESPN: use.md
  - Client: pyespn.md
  - Exceptions: exceptions.md
  - Classes:
    - League: classes/league_class.md
    - Team: classes/teams_class.md
    - Player: classes/player_class.md
    - Recruit: classes/recruit_class.md
    - Betting: classes/betting_class.md
    - Draft: classes/draft_class.md
    - Event: classes/event_class.md
    - Venue: classes/venue_class.md
  - Discover: discover.md
  - Postman: postman.md
  - About:
    - License: LICENSE.md

theme:
  name: material
  favicon: img/favicon.ico
  logo: img/pyespn.png
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - search.suggest
    - search.highlight
    - search.share
    - navigation.footer
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      default_handler: python

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

repo_url: https://github.com/EnderLocke/pyespn
repo_name: PYESPN
copyright: Copyright &copy; 2025 Zach Stocker
